<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playable Strategy Game</title>

<style>
body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

#map{
display:grid;
grid-template-columns:repeat(10,50px);
gap:2px;
justify-content:center;
margin-top:20px;
}

.tile{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
border:2px solid #111;
}

.selected{
border:2px solid white;
}

.Japan{background:#ef4444;}
.Enemy{background:#3b82f6;}
.sea{background:#1d4ed8;}

#info{
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
}
</style>

</head>
<body>

<h2>Strategy Game（操作できる版）</h2>

<div id="info">クリックでユニットを動かせ</div>

<div id="map"></div>

<button onclick="endTurn()">ターン終了</button>

<script>

const W=10,H=10
let map=[]
let selected=null

function createMap(){

for(let i=0;i<W*H;i++){

let type=Math.random()<0.2?"sea":"land"

if(type==="sea"){
map.push({type:"sea"})
}else{

let owner=Math.random()<0.5?"Japan":"Enemy"

map.push({
type:"land",
owner:owner,
unit:{
owner:owner,
str:Math.floor(Math.random()*10)+5
}
})

}

}

}

function draw(){

const m=document.getElementById("map")
m.innerHTML=""

map.forEach((t,i)=>{

let d=document.createElement("div")

d.className="tile "+(t.owner||"sea")

if(i===selected) d.classList.add("selected")

if(t.type==="land"){
d.innerHTML=t.unit?t.unit.str:""
}

d.onclick=()=>clickTile(i)

m.appendChild(d)

})

}

function clickTile(i){

let tile=map[i]

// 選択
if(selected===null){

if(tile.unit && tile.unit.owner==="Japan"){
selected=i
draw()
}

return
}

// 移動/攻撃
let from=map[selected]
let to=tile

let dirs=[-1,1,W,-W]

if(!dirs.includes(i-selected)){
selected=null
draw()
return
}

// 海は不可
if(to.type==="sea"){
selected=null
draw()
return
}

// 戦闘
if(to.unit){

if(to.unit.owner!=="Japan"){

if(from.unit.str>to.unit.str){

to.unit=from.unit
to.owner="Japan"
from.unit=null

}else{
from.unit=null
}

}else{

// 味方移動
to.unit=from.unit
from.unit=null

}

}else{

// 空き地移動
to.unit=from.unit
to.owner="Japan"
from.unit=null

}

selected=null
draw()

}

function enemyTurn(){

map.forEach((t,i)=>{

if(t.unit && t.unit.owner==="Enemy"){

let dirs=[-1,1,W,-W]
let move=i+dirs[Math.floor(Math.random()*4)]

if(move<0||move>=map.length)return

let target=map[move]

if(target.type==="sea") return

if(!target.unit){

target.unit=t.unit
target.owner="Enemy"
t.unit=null

}else if(target.unit.owner==="Japan"){

if(t.unit.str>target.unit.str){

target.unit=t.unit
target.owner="Enemy"
t.unit=null

}else{
t.unit=null
}

}

}

})

}

function endTurn(){

enemyTurn()
draw()

}

createMap()
draw()

</script>

</body>
</html>
