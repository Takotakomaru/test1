<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini World Strategy Game</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#ui{
margin-bottom:10px;
font-size:18px;
}

#map{
display:grid;
grid-template-columns:repeat(16,40px);
grid-gap:1px;
justify-content:center;
}

.tile{
width:40px;
height:40px;
font-size:9px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
border:1px solid #222;
}

.sea{
background:#0b3d91;
}

.Japan{background:#e74c3c;}
.Germany{background:#3498db;}
.USA{background:#2ecc71;}
.USSR{background:#f1c40f;color:black;}
.China{background:#9b59b6;}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#log{
margin-top:10px;
background:#222;
height:160px;
overflow:auto;
width:650px;
margin-left:auto;
margin-right:auto;
padding:8px;
text-align:left;
}

</style>
</head>
<body>

<h2>Mini World Strategy Game</h2>

<div id="ui"></div>

<div id="map"></div>

<button onclick="nextTurn()">Next Turn</button>

<div id="log"></div>

<script>

const width=16
const height=10

const playerCountry="Japan"

const countries={
Japan:{army:50},
USA:{army:60},
Germany:{army:55},
USSR:{army:65},
China:{army:70}
}

const worldMap=[

"~~~~~~~UUUU~~~~",
"~~~~~~~UUUU~~~~",
"~~GGGG~~~UU~~~~",
"~~GGGG~~~UU~~~~",
"~~~~~CCCCCC~~~~",
"~~~~~CCCCCC~~~~",
"~~~~~~~JJJ~~~~~",
"~~~~~~~JJJ~~~~~",
"~~~~~~~~~~~~~~~",
"~~~~~~~~~~~~~~~"

]

let map=[]

function createMap(){

for(let y=0;y<height;y++){

for(let x=0;x<width;x++){

let c=worldMap[y][x]

if(c==="~"){

map.push({type:"sea"})

}else{

let owner={
U:"USA",
G:"Germany",
C:"China",
J:"Japan"
}[c]

map.push({
type:"land",
owner:owner,
industry:Math.floor(Math.random()*3)+1
})

}

}

}

}

function drawMap(){

let mapDiv=document.getElementById("map")
mapDiv.innerHTML=""

map.forEach(tile=>{

let d=document.createElement("div")

if(tile.type==="sea"){

d.className="tile sea"
d.innerHTML=""

}else{

d.className="tile "+tile.owner
d.innerHTML=tile.owner

}

mapDiv.appendChild(d)

})

}

function log(t){

let l=document.getElementById("log")
l.innerHTML+=t+"<br>"
l.scrollTop=l.scrollHeight

}

function updateUI(){

let playerArmy=countries[playerCountry].army

document.getElementById("ui").innerHTML=
"Your Country: "+playerCountry+
" | Army: "+playerArmy

}

function produce(){

for(let c in countries){

let prod=0

map.forEach(t=>{
if(t.owner===c) prod+=t.industry||0
})

countries[c].army+=prod

}

}

function attack(){

let landTiles=map
.map((t,i)=>({tile:t,index:i}))
.filter(t=>t.tile.type==="land")

let from=landTiles[Math.floor(Math.random()*landTiles.length)]

let directions=[-1,1,width,-width]

let toIndex=from.index+directions[Math.floor(Math.random()*4)]

if(toIndex<0||toIndex>=map.length)return

let target=map[toIndex]

if(target.type!=="land")return
if(target.owner===from.tile.owner)return

let attacker=from.tile.owner
let defender=target.owner

let atk=countries[attacker].army*Math.random()
let def=countries[defender].army*Math.random()

if(atk>def){

target.owner=attacker
countries[defender].army-=5

log(attacker+" captured land from "+defender)

}else{

countries[attacker].army-=5

}

}

function nextTurn(){

produce()

for(let i=0;i<8;i++){
attack()
}

drawMap()
updateUI()

}

createMap()
drawMap()
updateUI()

</script>

</body>
</html>
