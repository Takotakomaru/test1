<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini HOI4 Browser Game</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#topbar{
padding:10px;
background:#1e293b;
}

#map{
display:grid;
grid-template-columns:repeat(20,35px);
gap:1px;
justify-content:center;
margin-top:10px;
}

.tile{
width:35px;
height:35px;
font-size:8px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #111;
}

.sea{background:#1d4ed8}

.Japan{background:#ef4444}
.Germany{background:#3b82f6}
.USA{background:#22c55e}
.USSR{background:#facc15;color:black}
.China{background:#a855f7}

#panel{
margin-top:10px;
}

button{
padding:8px 15px;
margin:5px;
}

#log{
background:#111;
width:700px;
height:180px;
overflow:auto;
margin:auto;
margin-top:10px;
text-align:left;
padding:6px;
}

</style>
</head>

<body>

<div id="topbar">
Player Country: <span id="playerCountry"></span>
 | Army: <span id="army"></span>
 | Industry: <span id="industry"></span>
</div>

<div id="map"></div>

<div id="panel">
<button onclick="nextTurn()">Next Turn</button>
</div>

<div id="log"></div>

<script>

const width=20
const height=12

const PLAYER="Japan"

const countries={
Japan:{army:80,industry:0},
USA:{army:100,industry:0},
Germany:{army:90,industry:0},
USSR:{army:120,industry:0},
China:{army:110,industry:0}
}

const mapTemplate=[

"~~~~~UUUUUU~~~~~~~",
"~~~~~UUUUUU~~~~~~~",
"~~~~~~~UUUU~~~~~~~",
"~~GGGG~~~~~CCCC~~~",
"~~GGGG~~~~~CCCC~~~",
"~~GGGG~~~~~CCCC~~~",
"~~~~~~~JJJJ~~~~~~~",
"~~~~~~~JJJJ~~~~~~~",
"~~~~~~~JJJJ~~~~~~~",
"~~~~~~~JJJJ~~~~~~~",
"~~~~~~~~~~~~~~~~~~",
"~~~~~~~~~~~~~~~~~~"

]

let map=[]

function log(text){
let l=document.getElementById("log")
l.innerHTML+=text+"<br>"
l.scrollTop=l.scrollHeight
}

function createMap(){

for(let y=0;y<height;y++){

for(let x=0;x<width;x++){

let c=mapTemplate[y][x]

if(c==="~"){
map.push({type:"sea"})
}else{

let owner={
U:"USA",
G:"Germany",
C:"China",
J:"Japan"
}[c]

map.push({
type:"land",
owner:owner,
industry:Math.floor(Math.random()*3)+1,
unit:null
})

}

}

}

}

function drawMap(){

let mapDiv=document.getElementById("map")
mapDiv.innerHTML=""

map.forEach((tile,i)=>{

let d=document.createElement("div")

if(tile.type==="sea"){
d.className="tile sea"
}else{

d.className="tile "+tile.owner

let txt=tile.owner

if(tile.unit){
txt+="<br>"+tile.unit.str
}

d.innerHTML=txt

}

mapDiv.appendChild(d)

})

}

function updateStats(){

let army=countries[PLAYER].army
let ind=0

map.forEach(t=>{
if(t.owner===PLAYER) ind+=t.industry||0
})

document.getElementById("playerCountry").innerText=PLAYER
document.getElementById("army").innerText=army
document.getElementById("industry").innerText=ind

}

function produce(){

for(let c in countries){

let prod=0

map.forEach(t=>{
if(t.owner===c) prod+=t.industry||0
})

countries[c].army+=prod

}

}

function spawnUnits(){

map.forEach(tile=>{

if(tile.type!=="land") return

if(Math.random()<0.05){

tile.unit={
owner:tile.owner,
str:Math.floor(Math.random()*20)+10
}

}

})

}

function moveUnits(){

map.forEach((tile,i)=>{

if(!tile.unit) return

let dirs=[-1,1,width,-width]

let target=i+dirs[Math.floor(Math.random()*4)]

if(target<0||target>=map.length) return

let t=map[target]

if(t.type==="sea") return

if(!t.unit){

t.unit=tile.unit
tile.unit=null

}else{

battle(tile,t)

}

})

}

function battle(a,b){

let atk=a.unit
let def=b.unit

if(atk.owner===def.owner) return

let atkPower=atk.str*Math.random()
let defPower=def.str*Math.random()

if(atkPower>defPower){

b.unit=atk
a.unit=null

b.owner=atk.owner

countries[def.owner].army-=10

log(atk.owner+" captured land")

}else{

a.unit=null
countries[atk.owner].army-=10

}

}

function aiActions(){

spawnUnits()
moveUnits()

}

function nextTurn(){

produce()

aiActions()

drawMap()

updateStats()

}

createMap()

drawMap()

updateStats()

</script>

</body>
</html>
