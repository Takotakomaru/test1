<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Full Strategy Game</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;}
#top{background:#1e293b;padding:10px;}
#map{display:grid;grid-template-columns:repeat(12,50px);gap:2px;justify-content:center;margin-top:10px;}
.tile{width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #111;cursor:pointer;}
.selected{border:2px solid white;}
.Japan{background:#ef4444;}
.Enemy{background:#3b82f6;}
.Neutral{background:#666;}
.sea{background:#1d4ed8;}
#panel{margin-top:10px;}
button{padding:8px;margin:3px;}
#log{background:#111;width:700px;height:200px;overflow:auto;margin:auto;margin-top:10px;text-align:left;padding:5px;}
</style>

</head>
<body>

<div id="top">
国: <span id="country"></span> |
軍: <span id="army"></span> |
工業: <span id="industry"></span> |
ターン: <span id="turn"></span>
</div>

<div id="map"></div>

<div id="panel">
<button onclick="produceUnit()">ユニット生産</button>
<button onclick="endTurn()">ターン終了</button>
</div>

<div id="log"></div>

<script>

// ================= 基本設定 =================
const W=12,H=12
const PLAYER="Japan"
let turn=1
let selected=null
let map=[]

// ================= 国家 =================
const countries={
Japan:{army:50},
Enemy:{army:60},
Neutral:{army:0}
}

// ================= ログ =================
function log(t){
let l=document.getElementById("log")
l.innerHTML+=t+"<br>"
l.scrollTop=l.scrollHeight
}

// ================= マップ生成 =================
function createMap(){
for(let i=0;i<W*H;i++){

let type=Math.random()<0.15?"sea":"land"

if(type==="sea"){
map.push({type:"sea"})
}else{

let ownerRand=Math.random()
let owner="Neutral"

if(ownerRand<0.4) owner="Japan"
else if(ownerRand<0.8) owner="Enemy"

map.push({
type:"land",
owner:owner,
industry:Math.floor(Math.random()*3)+1,
unit: Math.random()<0.3 ? {
owner:owner,
hp:20,
atk:Math.floor(Math.random()*10)+5
} : null
})

}

}
}

// ================= 描画 =================
function draw(){
const m=document.getElementById("map")
m.innerHTML=""

map.forEach((t,i)=>{

let d=document.createElement("div")
d.className="tile "+(t.owner||"sea")

if(i===selected) d.classList.add("selected")

if(t.type==="land"){
if(t.unit){
d.innerHTML=t.unit.hp+"<br>"+t.unit.atk
}
}

d.onclick=()=>clickTile(i)

m.appendChild(d)

})
}

// ================= UI更新 =================
function updateUI(){

let army=countries[PLAYER].army
let ind=0

map.forEach(t=>{
if(t.owner===PLAYER) ind+=t.industry||0
})

document.getElementById("country").innerText=PLAYER
document.getElementById("army").innerText=army
document.getElementById("industry").innerText=ind
document.getElementById("turn").innerText=turn
}

// ================= クリック処理 =================
function clickTile(i){

let t=map[i]

// 選択
if(selected===null){
if(t.unit && t.unit.owner===PLAYER){
selected=i
draw()
}
return
}

// 移動
let from=map[selected]
let to=map[i]

let dirs=[-1,1,W,-W]

if(!dirs.includes(i-selected)){
selected=null
draw()
return
}

// 海不可
if(to.type==="sea"){
selected=null
draw()
return
}

// 戦闘
if(to.unit){

if(to.unit.owner!==PLAYER){

battle(from,to)

}else{

// 味方移動
to.unit=from.unit
from.unit=null

}

}else{

// 空地
to.unit=from.unit
to.owner=PLAYER
from.unit=null

}

selected=null
draw()
updateUI()

}

// ================= 戦闘 =================
function battle(a,b){

let atk=a.unit
let def=b.unit

def.hp -= atk.atk

if(def.hp<=0){
b.unit=atk
b.owner=PLAYER
a.unit=null
log("占領成功")
return
}

atk.hp -= def.atk

if(atk.hp<=0){
a.unit=null
log("攻撃失敗")
}

}

// ================= 生産 =================
function produce(){

for(let c in countries){

let prod=0

map.forEach(t=>{
if(t.owner===c) prod+=t.industry||0
})

countries[c].army+=prod

}

}

// ================= ユニット生産 =================
function produceUnit(){

for(let i=0;i<map.length;i++){

let t=map[i]

if(t.owner===PLAYER && !t.unit){

t.unit={
owner:PLAYER,
hp:20,
atk:10
}

countries[PLAYER].army-=10
log("ユニット生産")

draw()
updateUI()
return
}

}

}

// ================= 敵AI =================
function enemyAI(){

map.forEach((t,i)=>{

if(t.unit && t.unit.owner==="Enemy"){

let dirs=[-1,1,W,-W]
let move=i+dirs[Math.floor(Math.random()*4)]

if(move<0||move>=map.length)return

let target=map[move]

if(target.type==="sea") return

if(!target.unit){

target.unit=t.unit
target.owner="Enemy"
t.unit=null

}else if(target.unit.owner==="Japan"){

battle(t,target)

}

}

})

}

// ================= 勝利判定 =================
function checkWin(){

let playerLand=0
let enemyLand=0

map.forEach(t=>{
if(t.owner==="Japan") playerLand++
if(t.owner==="Enemy") enemyLand++
})

if(enemyLand===0){
alert("勝利！")
location.reload()
}

if(playerLand===0){
alert("敗北…")
location.reload()
}

}

// ================= ターン =================
function endTurn(){

produce()
enemyAI()
turn++

draw()
updateUI()
checkWin()

}

// ================= 初期化 =================
createMap()
draw()
updateUI()

</script>

</body>
</html>
