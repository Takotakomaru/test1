<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Strategy Game</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center;}
#top{background:#1e293b;padding:10px;}
#map{display:grid;grid-template-columns:repeat(14,45px);gap:2px;justify-content:center;margin-top:10px;}
.tile{width:45px;height:45px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;border:2px solid #111;cursor:pointer;}
.selected{border:2px solid white;}
.frontline{outline:2px solid yellow;}
.Japan{background:#ef4444;}
.Enemy{background:#3b82f6;}
.sea{background:#1d4ed8;}
.capital{border:2px solid gold;}
#log{background:#111;width:800px;height:200px;overflow:auto;margin:auto;margin-top:10px;text-align:left;padding:5px;}
button{padding:8px;margin:5px;}
</style>

</head>
<body>

<div id="top">
国: 日本 | ターン: <span id="turn"></span>
</div>

<div id="map"></div>

<button onclick="endTurn()">ターン終了</button>

<div id="log"></div>

<script>

// ================= 基本 =================
const W=14,H=14
let turn=1
let map=[]
let selected=null

// ================= ログ =================
function log(t){
let l=document.getElementById("log")
l.innerHTML+=t+"<br>"
l.scrollTop=l.scrollHeight
}

// ================= マップ生成 =================
function createMap(){

for(let i=0;i<W*H;i++){

let sea=Math.random()<0.1

if(sea){
map.push({type:"sea"})
continue
}

let owner=Math.random()<0.5?"Japan":"Enemy"

map.push({
type:"land",
owner:owner,
units:[],
capital:false
})

}

// 首都
map[5].capital=true
map[W*H-5].capital=true

}

// ================= ユニット生成 =================
function spawnInitial(){

map.forEach(t=>{
if(t.type==="land"){

let n=Math.floor(Math.random()*2)

for(let i=0;i<n;i++){
t.units.push({
owner:t.owner,
hp:20,
atk:8
})
}

}

})

}

// ================= 描画 =================
function draw(){

let m=document.getElementById("map")
m.innerHTML=""

map.forEach((t,i)=>{

let d=document.createElement("div")

if(t.type==="sea"){
d.className="tile sea"
}else{

d.className="tile "+t.owner

if(t.capital) d.classList.add("capital")

let txt=""

t.units.forEach(u=>{
txt+=u.hp+" "
})

d.innerHTML=txt

}

if(isFrontline(i)) d.classList.add("frontline")

if(i===selected) d.classList.add("selected")

d.onclick=()=>clickTile(i)

m.appendChild(d)

})

document.getElementById("turn").innerText=turn

}

// ================= 前線判定 =================
function isFrontline(i){

let t=map[i]
if(t.type!=="land") return false

let dirs=[-1,1,W,-W]

for(let d of dirs){

let n=i+d
if(n<0||n>=map.length) continue

if(map[n].owner!==t.owner && map[n].type==="land"){
return true
}

}

return false
}

// ================= クリック =================
function clickTile(i){

let t=map[i]

if(selected===null){

if(t.units.some(u=>u.owner==="Japan")){
selected=i
draw()
}
return
}

let from=map[selected]
let to=map[i]

let dirs=[-1,1,W,-W]

if(!dirs.includes(i-selected)){
selected=null
draw()
return
}

if(to.type==="sea"){
selected=null
draw()
return
}

// 移動 or 戦闘
if(to.owner==="Japan"){

to.units=to.units.concat(from.units)
from.units=[]

}else{

battle(from,to)

}

selected=null
draw()

}

// ================= 戦闘 =================
function battle(a,b){

while(a.units.length && b.units.length){

let atk=a.units[0]
let def=b.units[0]

def.hp-=atk.atk

if(def.hp<=0){
b.units.shift()
continue
}

atk.hp-=def.atk

if(atk.hp<=0){
a.units.shift()
}

}

if(a.units.length>0 && b.units.length===0){

b.owner="Japan"
b.units=a.units
a.units=[]

log("領土占領")

}

}

// ================= AI =================
function enemyAI(){

map.forEach((t,i)=>{

if(t.owner!=="Enemy") return
if(t.units.length===0) return

let dirs=[-1,1,W,-W]

for(let d of dirs){

let n=i+d
if(n<0||n>=map.length) continue

let target=map[n]

if(target.type==="sea") continue

if(target.owner==="Japan"){

battle(t,target)
return

}

}

})

}

// ================= 勝利 =================
function checkWin(){

for(let t of map){

if(t.capital && t.owner==="Enemy"){
alert("敗北")
location.reload()
}

if(t.capital && t.owner==="Japan"){
// OK
}

}

}

// ================= ターン =================
function endTurn(){

enemyAI()
turn++
draw()
checkWin()

}

// ================= 初期化 =================
createMap()
spawnInitial()
draw()

</script>

</body>
</html>
